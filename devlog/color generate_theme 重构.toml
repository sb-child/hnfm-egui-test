title = "对比测试验证"
created_at = "2026-07-20 19:43:15 UTC+8"
modified_at = "2026-07-20 19:43:15 UTC+8"
content = "## 测试架构\n\n用 crate 自带的 variant wrapper（如 `SchemeTonalSpot`、`SchemeCmf` 等）作为权威参考，通过 `DynamicScheme` deref 调用颜色方法，逐字段对比我们的 `generate_theme` 输出。\n\n### 覆盖范围\n\n- 10 个 variant：Monochrome / Neutral / TonalSpot / Vibrant / Expressive / Fidelity / Content / Rainbow / FruitSalad / Cmf\n- 6 种对比度组合：light/dark × standard(0.0)/medium(0.5)/high(1.0)\n- 每种组合对比全部 46 个颜色字段\n\n### 工具宏\n\n- `assert_scheme_eq!` — 对 `Scheme` 和 `DynamicScheme` 做逐字段 `assert_eq!`，失败时打印字段名\n- `test_variant!` — 生成非 CMF variant 的测试函数，循环 6 种组合\n\n### 结果\n\n全部 10 个测试通过，证明 `generate_theme` 的 `DynamicScheme::new(DynamicSchemeOptions{...})` 与 crate 官方 wrapper 完全等价。"
desc = "用 crate 官方 variant wrapper 作为参考实现，验证 generate_theme 全部 10 variant × 6 对比度组合的颜色输出"

