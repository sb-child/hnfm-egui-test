[[sections]]
number = "11"
title = "步骤 3：Flyout 覆盖层渲染"
created_at = "2026-07-22 21:19:48 UTC+8"
modified_at = "2026-07-22 21:19:48 UTC+8"
content = "## 变更\n\n### sidebar.rs\n- 删除旧 `render` 函数和 `render_pinned_panel` 函数\n- 新增 `pub fn render_overlays(ctx, state, surface_color, list_sel_*)`: 覆盖层分发\n  - Flyout → `render_flyout`\n  - Modal → `render_flyout` (placeholder)\n- 新增 `fn render_flyout(ctx, rail, surface_color, list_sel_*)`: Area 覆盖层\n  - 固定位置 pos2(96, 0)（rail 右侧）\n  - Frame: inner_margin 12, ne/se CornerRadius=12, Shadow offset=[8,0] blur=24, stroke 1px\n  - Order::Foreground, constrain=false, interactable\n- 新增 `pub fn render_pinned(ui, state, list_sel_*)`: Panel 内部渲染\n  - 读 state.mode 取 Pinned(rail)，set_width(300) + heading + content\n- `render_sidebar_content` 保持不变\n\n### app.rs\n- 调用顺序：`render_overlays` → `render_pinned`(Panel 内部)\n- render_overlays 传入 `surface_color` 用于 Flyout 背景\n- render_pinned 传入 `&self.sidebar_state`（只读，不需 &mut）\n\n## 预期行为\n- Wide(>=1000): Pinned Panel 正常显示\n- Medium(<1000): 点击 rail 图标 → Flyout 覆盖层弹出（阴影+圆角），不挤压内容区\n- 再次点击同一 rail → Flyout 关闭"
desc = "拆分 render 为 render_overlays(Area)+render_pinned(Panel)，实现 Flyout 阴影圆角覆盖层渲染"

[[sections]]
number = "12"
title = "步骤 3 完成：Flyout 尺寸精确对齐 + NavRail 测试按钮"
created_at = "2026-07-22 21:51:08 UTC+8"
modified_at = "2026-07-22 21:51:08 UTC+8"
content = "## 最终方案\n\n### Flyout 尺寸\n- x=96（rail 右侧），y=`content_rect.top()`，高度=`content_rect.height()`\n- `render_overlays` 在 sidebar Panel 之后、tabs/terminal 之前调用\n- `ui.available_rect_before_wrap()` 此时已扣掉 statusbar，但 tabs/terminal 未占位 → 高度=`screen_h - statusbar_h`\n- 覆盖范围：tabs + CentralPanel + terminal（和 Pinned sidebar 一致）\n\n### 关键实现细节\n- Area 定位用 `allocate_ui(vec2(300, content_rect.height()))` 固定尺寸\n- Frame 背景填满 max_rect，内容用 `ui.add_space(ui.available_height())` 撑满\n- Frame: inner_margin 12, ne/se CornerRadius=12, Shadow offset=[8,0] blur=24, stroke 1px\n\n### NavRail 测试按钮\n- `nav_rail` 新增 `sidebar_state: &mut SidebarState` + `screen_width` 参数\n- 底部 separator 下方 4 个临时按钮：Files/Projects/Settings/Help\n- `sidebar_button` 辅助函数：active=当前 mode.rail() 匹配，clicked→rail_click\n\n### 文件改动\n- `src/sidebar.rs`: `render` → `render_overlays` + `render_pinned`，新增 `render_flyout`\n- `src/app.rs`: `nav_rail` 参数扩展，`render_overlays` 调用位置调整，`content_rect` 替代 `screen_rect`\n- 编译通过，零警告\n\n### 当前步骤状态\n- 步骤 1 ✓: 状态机重构 + Panel 条件渲染\n- 步骤 2 ✓: render_sidebar_content 填充 ListItem\n- 步骤 3 ✓: Flyout 覆盖层渲染 + 尺寸对齐\n- 步骤 4: Modal 渲染（scrim + Area）\n- 步骤 5: Hover 防抖 180ms\n- 步骤 6: Pin/Unpin\n- 步骤 7: Hover Preview 浮层\n- 步骤 8: 视觉层级（圆角/阴影动态切换）\n- 步骤 9: 动画过渡"
desc = "Flyout 覆盖层渲染完成，高度用 available_rect_before_wrap 精确匹配内容区，NavRail 底部 4 个临时测试按钮"

[[sections]]
number = "13"
title = "步骤 4 完成：Modal 渲染（scrim + Area 覆盖层）"
created_at = "2026-07-22 22:08:39 UTC+8"
modified_at = "2026-07-22 22:08:39 UTC+8"
content = "## 变更\n\n严格按照设计文档 §9 实现 Modal 的 scrim + 分层 Area 渲染。\n\n### 4a: 提取 render_overlay_content() 共享函数\n- 将 Frame 构建 + heading + render_sidebar_content 从 render_flyout 提取为独立函数\n- render_flyout 改为调用 render_overlay_content\n- Flyout 行为零变更\n\n### 4b: render_overlays 签名加 screen_width\n- 新增 screen_width: f32 参数\n- app.rs 调用处传入已有变量\n\n### 4c: Modal 分支渲染 scrim + content\n- scrim Area (modal_scrim): pos2(96,0), screen_w-96 × screen_h, scheme.scrim γ=0.5, allocate_painter + Sense::click() 关闭\n- content Area (modal_content): pos2(96,0), 300px 宽 × screen_h 高, 共用 render_overlay_content\n- 两个 Area 同为 Order::Foreground，scrim 先创建（低 z），content 后创建（高 z）\n- 均设 constrain(false)\n\n### 4d: 清理 handle_input 注释\n- 去掉\\\"scrim点击关闭将在render函数中处理\\\"的 todo 注释\n- 更新文档注释为\\\"Modal 的 Esc 关闭\\\"\n\n## 关闭方式\n\n| 方式 | 位置 |\n|------|------|\n| Esc 键 | handle_input |\n| 点击 scrim | render_overlays Modal 分支 scrim Area |\n\n## 编译\n\ncargo check 零警告"
desc = "实现 Modal 的 scrim 半透明遮罩 + 分层 Area 渲染，点击 scrim / Esc 关闭"
related_todos = [
    "步骤 4: Modal 渲染（scrim + Area 覆盖层）",
]

[[sections]]
number = "14"
title = "修复：Modal scrim 不可见——Area fade_in 默认动画导致前几帧 opacity=0"
created_at = "2026-07-22 23:08:09 UTC+8"
modified_at = "2026-07-22 23:08:09 UTC+8"
content = "## 根因\n\negui Area 首次创建时有默认 ~100ms fade_in 动画：\n- 第1帧：sizing_pass，内容丢弃\n- 第2帧：opacity≈0，Shape::Noop\n- 第3-6帧：opacity 渐进至 1.0\n\n导致点击触发 Modal 后前 100ms 完全看不到 scrim。\n\n## 修复\n\nscrim 和 modal_content 两个 Area 均加 `.fade_in(false)`，立即显示。\n\n## 同时修正\n\n- scrim 渲染从 `allocate_painter` 改为与 Flyout 一致的 `allocate_ui` 模式\n- scrim Area 显式加 `.interactable(true)`"
desc = "Modal scrim 不可见是因为 Area 默认 fade_in 动画导致前几帧 opacity=0"
