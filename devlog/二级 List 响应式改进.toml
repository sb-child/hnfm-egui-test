[[sections]]
number = "6"
title = "完整功能需求文档：inline/modal 切换"
created_at = "2026-07-22 19:51:03 UTC+8"
modified_at = "2026-07-22 19:51:03 UTC+8"
content = "## 背景\n\n基于 sidebar.md 的设计讨论，本 devlog 记录本次要实现的第一个最小步：\n给导航栏加\"切换列表模式\"按钮，实现 inline ↔ modal 两种渲染模式切换。\n\n## 需求概述\n\n### 两种渲染模式\n\n| 模式 | 渲染方式 | Panel | 浮层 |\n|------|---------|-------|------|\n| inline | Panel 内嵌渲染 list | Panel 存在，宽度 300px | 无 |\n| modal | 浮层渲染 + scrim | Panel 折叠到 0px，不渲染 list | 全屏 scrim + 左侧浮动 list |\n\n### 切换行为\n\n**inline → modal**（用户点按钮切换）：\n1. sidebar_expanded 立刻变为 false\n2. Panel 内 list 立刻停止渲染（Panel 变成空壳）\n3. Panel 宽度从 300→0 滑动（右侧内容区自然滑向左边）\n4. 滑动完成后 Panel 的 show_collapsible 返回 None，不再执行回调\n5. modal 浮层立刻出现，显示 list 内容\n\n**modal → inline**（用户点按钮 / 点 scrim / 按 Esc）：\n1. modal 浮层立刻消失\n2. sidebar_expanded 立刻变为 true\n3. Panel 内 list 立刻开始渲染\n4. Panel 宽度从 0→300 滑出（右侧内容区被挤回右边）\n\n### Modal 浮层细节\n\n- Scrim 覆盖范围：\n  - inline 模式时：标签页栏、内容区、终端\n  - modal 模式时：标签页栏、内容区、终端、二级列表内容区\n- Modal 侧边栏位置：从 x=96（导航栏右侧）开始\n- 关闭方式：\n  - 点击 scrim → sidebar_expanded = true\n  - 按 Esc 键 → sidebar_expanded = true\n- 视觉：scrim 色 + surface 背景色 sidebar 面板 + 无阴影（初始版）\n\n### 按钮细节\n\n- 位置：暂时放在导航栏（future: 独立 pin 按钮）\n- 文案：`\"列表: inline\"` / `\"列表: modal\"`\n- 点击 toggle sidebar_expanded\n\n### 可复用内容\n\ninline 和 modal 共享同一个 `sidebar_content()` 函数，包含：\n- heading \"Standard (单选)\" + standard list items\n- heading \"Segmented (多选)\" + segmented list items\n\n## 实现步骤（6 小步，每步可验证）\n\n### 步骤 1：添加 sidebar_expanded 状态字段\n\nAppLayout 新增 `sidebar_expanded: bool`，默认 `true`。\n验证：无新增编译错误（字段未使用警告可忽略）。\n\n### 步骤 2：提取 sidebar_content() 函数\n\n将 sidebar() 函数的渲染内容提取为独立函数 sidebar_content()，\nsidebar() 改为调用 sidebar_content()。行为零变化。\n验证：运行程序，侧边栏视觉效果不变。\n\n### 步骤 3：导航栏加切换按钮\n\nnav_rail() 新增参数 `sidebar_expanded: &mut bool`。\n在导航栏底部添加 NavRailItem 按钮，label 设为 `\"列表:\\ninline\"` / `\"列表:\\nmodal\"`，\nactive 高亮反映当前 expanded 状态。点击 toggle。\n验证：点按钮能看到 active 状态变化，但侧边栏还没动。\n\n### 步骤 4：Sidebar Panel 改为 show_collapsible\n\negui::Panel::left(\"sidebar\") 从 `.show()` 改为 `.show_collapsible()`，\nexpanded 绑定 `sidebar_expanded`。内容用 `if sidebar_expanded { sidebar_content() }` 控制。\n验证：点按钮 → Panel 空壳宽度 300→0 滑动缩回 / 0→300 滑出。\n\n### 步骤 5：添加 Modal 浮层\n\n在 Panel 之后，`if !sidebar_expanded` 时渲染：\n- egui::Area + Order::Foreground，覆盖 scrim 范围\n- scrim 色半透明背景 + 点击关闭\n- 左侧 x=96 处浮动 sidebar_content()（surface 背景色）\n- Esc 键关闭\n验证：点按钮 → Panel 缩回 + modal 浮层出现，点 scrim/Esc → modal 消失 + Panel 展开。\n\n### 步骤 6：完善细节 + 回归\n\n- scrim 覆盖范围精确计算\n- 确认 inline/modal 切换不影响其他 Panel（nav rail、tabs、terminal）\n- 确认内联模式下 scrim 范围覆盖标签页栏、内容区、终端\n- 确认 modal 模式下 scrim 范围额外覆盖侧边栏\n验证：全功能测试，切换流畅，内容一致。\n\n## 设计决策记录\n\n- 为什么用 show_collapsible：egui 原生支持 Panel 展开/折叠滑动动画，不需要手动管理动画状态。\n- Panel 空壳滑回：inline→modal 时 Panel 停止渲染 list，但依然存在并占据宽度，利用 show_collapsible 的动画让宽度从 300→0 平滑过渡。\n- 内容共享：inline 和 modal 共用 sidebar_content()，保证内容一致性。\n- sidebar.rs 不动：它已是多 rail 状态机骨架（RailId、SidebarMode 等），本次实现不涉及，未来填坑。"
desc = "inline/modal 切换功能的完整需求文档，含 6 个最小可验证步骤和设计决策"

[[sections]]
number = "7"
title = "三态模型完整设计：Pinned / Flyout / Modal"
created_at = "2026-07-22 19:56:06 UTC+8"
modified_at = "2026-07-22 19:56:06 UTC+8"
content = "# 三态模型完整设计：Pinned / Flyout / Modal\n\n## 设计目标\n\n从\"规则导向的被动切换\"优化为\"行为导向的主动掌控\"。\n\n将响应式规则简化为 **2 种通用用户模式 + 1 种极端窄屏兜底**：\n\n| 模式 | 描述 |\n|------|------|\n| 钉住模式 (Pinned) | 无论窗口多宽，只要用户点击\"画钉\"，List 始终常驻并挤压主内容区 |\n| 悬浮模式 (Flyout) | 默认折叠，鼠标悬停/点击 Rail 图标时，List 像菜单一样浮在上方，离开即自动收起（无需遮罩，不打断工作流） |\n| 窄屏兜底 (Modal) | 只有在窗口宽度极限缩小（如 < 600px）时，才强制转为带遮罩的模态框 |\n\n## 切换规则\n\n| 窗口状态 | 二级 List 默认形态 | 触发与交互逻辑 | 是否挤压主区 | 是否遮罩 |\n|---------|------------------|---------------|-------------|---------|\n| 宽屏 (Wide) | 常驻显示 (Pinned) | 允许点击 Header 的小按钮/双击分隔线手动收起 | 是 | 否 |\n| 中屏 (Medium) | 默认折叠，悬浮响应 (Flyout) | 点击/悬停 Rail 图标即刻弹出 List；点击 List 内任意项后自动收起。如果用户点击\"钉住\"，可强行切换为挤压模式 | 否 | 否（透明浮层，不阻断视线） |\n| 窄屏 (Compact) | 完全隐藏，模态响应 (Modal) | 点击 Rail 图标或顶部 Breadcrumb 按钮弹出 List，此时出现半透明遮罩，点击遮罩或按下 Esc 退出 | 否 | 是 |\n\n## 核心交互细节\n\n### Hover 防抖（Intentionality Delay）\n\n设置 **150ms ~ 200ms 的防抖延迟（Debounce）**。\n\n- 当鼠标停留超过 150ms，才判定用户有\"查看意图\"，弹出 Flyout\n- 如果鼠标只是快速穿过 Rail 去点击顶部的 Tab，Flyout 不会被触发\n\n### Pin/Unpin 机制\n\n在二级 List 的 Header（右上角）放置一个\"画钉\"图标（Pin Icon）：\n\n- **钉住状态（Pinned）**：二级 List 成为常规面板，占用空间并推动右侧的主内容区\n- **取消钉住（Unpinned）**：二级 List 自动向左收起，贴附在 Navigation Rail 边缘\n\n优点：彻底把控制权交给用户。有些用户即使在小屏上也想强行常驻列表，或者在大屏上想全屏写代码/看终端，画钉机制能完美满足这两种极值需求。\n\n### Pinned 状态下 Hover 其他 Rail\n\n引入\"当前激活项（Active Page）\"与\"临时预览项（Hover Preview）\"分离的机制：\n\n```\n[ 当前状态：设置 (Pinned/Inline) ]\n       │\n       ├─► 鼠标 Hover 到 \"项目\" 图标\n       │      │\n       │      └─► 在 Inline \"设置\" 列表的【上方/遮盖层】弹出 \"项目\" 的 Flyout 浮层\n       │          （此时主内容区依然显示 \"设置\" 的页面，不发生跳转）\n       │\n       ├─► 动作 A：鼠标移走 ──────► Flyout 消失，恢复显示的还是 Pinned 的 \"设置\" 列表\n       ├─► 动作 B：点击 Flyout 内的子项 ──► 页面跳转至 \"项目>某子项\"，且 Pinned 目标切换为 \"项目\"\n       └─► 动作 C：点击 Flyout 内的 Pin ─► 页面切换至 \"项目\"，并将 Pinned 目标无缝替换为 \"项目\"\n```\n\n为什么这个逻辑最顺畅：\n\n1. **Pin 代表的是\"布局模式（Pinned Mode）\"**：它决定了\"侧边栏始终开着一个位置\"\n2. **Hover 产生的 Flyout 是\"浮动顶层（Modal/Popover Layer）\"**：它的 z-index 始终高于 Inline 区域\n3. **安全感与撤销成本低**：用户 Hover 查看别的列表时，不需要担心破坏当前 Pin 住的上下文，只要鼠标移开就能\"还原\"\n\n## 视觉层级区分\n\n| 视觉元素 | 浮层状态 (Flyout / Hover) | 嵌入状态 (Inline / Pinned) |\n|---------|-------------------------|--------------------------|\n| Z-Index (层级) | 高层级（浮在内容区与终端上） | 基础层级（与右侧内容区同级，平铺布局） |\n| 阴影 (Shadow) | 带有明显的大范围弥散阴影 (`box-shadow: 8px 0 24px rgba(0,0,0,0.4)`) | 无阴影（完全扁平） |\n| 圆角 (Radius) | 右上角与右下角带有大圆角 (如 `0 12px 12px 0`)，强化\"卡片浮动感\" | 无圆角 (`0px`)，与四周网格缝合 |\n| 遮罩 (Mask) | 可搭配右侧主内容区 20% 透明度的暗色遮罩（Scrim）（可选） | 无遮罩，主内容区完全高亮可操作 |\n| 分隔线 (Border) | 悬浮卡片边缘有 1px 的亮色高亮边框 | 与主区之间仅靠 1px 的暗色 Splitter/分隔线区分 |\n| Pin 图标形态 | 显示为未固定状态（如斜置的画钉） | 显示为已固定状态（如垂直插下的画钉） |\n\n## 动画过渡方案\n\n### Flyout → Inline（用户点击了 Pin）\n\n1. **宽度展平**：右侧主内容区通过动画（200ms ease-out）向右推开 W_list 的宽度（margin-left: 0 → 200px）\n2. **样式演变**：在推开的过程中：\n   - List 的大阴影（Shadow）渐变为 0\n   - 右侧圆角从 12px 平滑变为 0px\n   - 遮罩层（如果有）Opacity 渐变为 0\n3. **布局落地**：动画结束后，List 正式进入 Flex/Grid 布局流，成为常驻节点\n\n### Inline → Flyout（用户取消了 Pin）\n\n1. List 的 position 瞬间转为绝对定位（保留当前位置）\n2. 主内容区通过动画补位缩小 margin-left，把空间收回\n3. List 顺势加上阴影和圆角，等待用户鼠标离开后淡出关闭\n\n## 可选拖拽分隔线 + 双击折叠\n\n既然是桌面端 UI（基于 egui 等 Rust 框架），可以充分发挥桌面端的指针优势：\n\n- 在二级 List 与右侧主内容区之间加一条 **1px~2px 的可拖拽手柄/分隔线**\n- **拖拽**：用户可以自由调整二级 List 的宽度（设置 Min/Max Width）\n- **双击分隔线**：快捷在\"当前宽度\"与\"完全折叠\"之间切换\n\n优点：极具桌面端软件的极客感与自由度，解决不同长文本在固定宽度下折行过长或被截断的问题。\n\n## 与章节 6 的关系\n\n- **章节 6**（P1+P2 实现计划）：基础 inline/modal 二态切换，6 步最小可验证实现\n- **本章节**（三态模型完整设计）：完整 Pinned/Flyout/Modal 三态模型，含 Hover 防抖、Pin/Unpin、视觉层级、动画过渡\n\n实现顺序：先完成章节 6 的基础 inline/modal，再迭代添加 Flyout 悬浮预览和 Pin 机制。\n"
desc = "响应式三态模型完整设计：Pinned（钉住常驻）、Flyout（悬浮预览）、Modal（窄屏兜底），含 Hover 防抖、Pin/Unpin、视觉层级、动画过渡方案"

[[sections]]
number = "8"
title = "Panel 宽度动画方案调研：PanelState 直写 + clip rect 裁剪"
created_at = "2026-07-22 21:03:18 UTC+8"
modified_at = "2026-07-22 21:03:18 UTC+8"
content = "## 背景\n\n步骤 9（Pinned 面板动画）需要：\n- Panel 宽度从 0 渐增到 300（展开）或 300 渐减到 0（合上）\n- 过程中 CentralPanel 被推（不跳动，Panel 始终存在）\n- 内容 300px 右对齐，左边界超出的被裁剪（\"滑入/滑出\"效果）\n\n## egui 0.35 Panel 宽度分配机制\n\n源码：`egui-0.35.0/src/containers/panel.rs`\n\nPanel 宽度在当前帧的分配流程：\n\n```\n第 654 行: outer_size = self.outer_size(parent_ui)\n  └→ 第 918 行: PanelState::load(ui, self.id).outer_rect.width\n     (无 PanelState 则 fallback 到 default_outer_size = 200)\n第 754 行: panel_ui.max_rect = 锁定为 outer_size 计算出的 rect\n第 761 行: content_ui 继承 panel_ui.max_rect\n第 774 行: 用户内容渲染 ← ui.set_width() 在此修改不了 max_rect（已被锁定）\n第 828 行: PanelState { outer_rect }.store() ← 存入供下一帧读取\n```\n\n关键结论：`ui.set_width(0.0)` 在当前帧无法让 Panel 收缩（Panel 宽度来自上一帧的 PanelState）。\n\n## 方案：直写 PanelState + clip rect 裁剪\n\n### 写入方式\n\n`store()` 是私有的，需用等价公有 API：\n\n```rust\nui.ctx().data_mut(|d| d.insert_persisted(\n    Id::new(\"sidebar\"),\n    PanelState {\n        outer_rect: Rect::from_min_size(Pos2::ZERO, vec2(animated_w, 1.0)),\n    },\n));\n```\n\n写入后立即调用 `Panel::left(\"sidebar\").show()`，则第 654 行 `load` 读取到我们写入的值，当前帧生效。\n\n### 内容渲染\n\n```rust\nPanel::left(\"sidebar\")\n    .min_size(0.0)\n    .frame(surface_frame)\n    .show(ui, |ui| {\n        // 内容固定 300px，右对齐到 Panel 右边\n        let right = ui.max_rect().right();\n        let content = Rect::from_min_size(\n            pos2(right - 300.0, ui.max_rect().top()),\n            vec2(300.0, ui.max_rect().height()),\n        );\n        ui.allocate_ui_at_rect(content, |ui| {\n            render_sidebar_content(ui, ...);\n        });\n        // content.left() 超出 Panel 左边界的部分\n        // 被第 758 行 set_clip_rect(visible_outer_rect) 自动裁剪\n    });\n```\n\n### 展开动画流程\n\n```\nFrame 0: Hidden 状态，不渲染 Panel\nFrame 1: 写 PanelState width=0，渲染 Panel（0px，内容全被裁剪）\nFrame 2-N: 逐帧增大 width=easing(t)*300，内容逐渐\"露出\"\nFrame N+1: width=300，切到正常 Pinned 模式（不需写 PanelState）\n```\n\n### 合上动画流程\n\n```\nFrame 0: Pinned 状态，正常渲染\nFrame 1-N: 逐帧减小 width=easing(t)*300，内容逐渐\"消失\"\nFrame N+1: width=0，切到 Hidden（不渲染 Panel）\n```\n\n## 验证项\n\n| 项 | 结论 | 说明 |\n|---|------|------|\n| PanelState 写入 | ✓ | store() 私有，用 ctx.data_mut + insert_persisted 绕过 |\n| 时序 | ✓ | 写入在 Panel::show() 之前，load 在第 654 行读到我们的值 |\n| 最小宽度 0 | ✓ | .min_size(0.0) + surface_frame(inner_margin 12px) → panel_axis_min = (0-24).at_least(0) = 0 |\n| clip rect 裁剪 | ✓ | Panel 第 758 行 set_clip_rect 传播到 content_ui，超出左边界的内容自动裁剪 |\n| ID 无 salt | ✓ | PanelState 存储键 = Panel 的原始 Id(\"sidebar\")，第 918/828 行一致 |\n\n## 注意事项\n\n- 步骤 1-8 暂不涉及 PanelState 写入（无动画），隐藏/显示直接用 Panel 是否渲染来控制\n- 步骤 9 动画阶段才需要 PanelState 写入\n- 内存数据 `insert_persisted` 每帧有效，窗口关闭不持久化（与 egui 内部 PanelState 一致）"
desc = "调研 egui 0.35 Panel 内部机制，验证通过 ctx.data_mut 直写 PanelState.outer_rect 控制 Panel 宽度动画的可行性，结论为可行"

[[sections]]
number = "9"
title = "Modal 渲染细节：scrim 不覆盖 rail + 圆角不越界"
created_at = "2026-07-22 21:09:38 UTC+8"
modified_at = "2026-07-22 21:09:38 UTC+8"
content = "## Scrim 覆盖范围\n\nscrim 不覆盖 rail（rail 始终可见可交互）：\n\n```\nscrim: pos2(96, 0), size = (screen_w - 96, screen_h)\n```\n\n覆盖区域：tabs + CentralPanel + terminal + 底层 sidebar（Modal 状态下 sidebar 自己渲染在 scrim 上方盖住 scrim）。\n\n## 分层渲染（Area z-index 自底向上）\n\n```\nArea \"modal_scrim\" (Order::Foreground)\n  → fixed_pos(pos2(96, 0))\n  → 全屏半透明黑色填充，无圆角\n  → Sense::click 关闭 Modal\n\nArea \"modal_content\" (更高 z，同一 Order 靠后创建)\n  → fixed_pos(pos2(96, 0))\n  → Frame: surface_color fill + Rounding { ne: 12, se: 12 } + inner_margin\n  → clip rect 宽度 0→300（展开动画）\n  → 内容 300px 右对齐，超出左边界的被 clip 裁剪\n```\n\n## 圆角不越界\n\n```\n[rail] [█████ scrim ████████████████████████]\n       [╭─ sidebar (Frame fill + ne/se 圆角) ─╮]\n       [│  sidebar content                    │]\n       [╰─────────────────────────────────────╯]\n       [█████ scrim 在圆角空隙可见 ████████████]  ← 正常行为，sidebar fill 盖住下方 scrim\n```\n\nsidebar 自己的 surface_color fill 占据矩形区域（含圆角拐角内侧），下方 scrim 被 fill 完全遮挡。圆角拐角外侧的 scrim 可见——这是正确行为（就像桌面端 flyout 菜单旁边的 scrim 也会透过圆角间隙露出来）。\n\n## 与 Flyout 的区别\n\n| 项 | Modal | Flyout |\n|---|-------|--------|\n| scrim | 有，alpha=0.5，click 关闭 | 无（或可选，很淡） |\n| 触发 | Narrow 下 rail 点击 | Medium 下 hover 防抖后展开 |\n| 关闭 | Esc / 点击 scrim | 鼠标移开 / 点击 sidebar 内项 |\n| z-index | 最高（盖住一切） | 次高（Pinned sidebar 上方，Modal 下方） |\n| Area position | pos2(96, 0) | pos2(96, Panel::top 下方) |\n"
desc = "Modal 的 scrim 覆盖范围、分层渲染、圆角处理等实现细节"

