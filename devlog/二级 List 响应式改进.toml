[[sections]]
number = "1"
title = "P1+P2 实现计划"
created_at = "2026-07-21 21:37:59 UTC+8"
modified_at = "2026-07-21 21:37:59 UTC+8"
content = "## 总体方案\n\n采用纯声明式 enum 状态机 `SidebarMode { Hidden, Flyout(RailId), Pinned(RailId), Modal(RailId) }`，响应式三阶梯（Wide>=1000 / Medium 600~1000 / Narrow<600）自动选择默认模式，用户可通过 Header Pin 按钮覆盖。\n\n## P1: 状态机 + Pin/Flyout + 180ms 防抖 + 视觉区分\n\n- SidebarState 存于 AppLayout\n- Wide 进应用默认 Pinned{rail_default}\n- Medium/Narrow 起手 Hidden\n- Rail hover + 180ms 防抖 → 触发 Flyout 或 Hover Preview\n- Pinned: Panel::left 扁平无阴影、无圆角\n- Flyout/Modal: Area Order::Foreground 悬浮，阴影 blur24 α0.4、大圆角 (0,12,12,0)\n- Modal: 附加 scrim 全屏半透明遮罩 + Esc/点遮罩关闭\n- Header Pin 按钮：toggle Pinned ↔ 当前响应式默认\n- 图标统一用 circle_stroke 圆圈占位（pinned/unpinned 用填充态区分）\n\n## P2: 响应式三阶默认 + Modal + Hover Preview 覆盖层\n\n- 每帧根据 screen_rect().width() 判断阈值\n- 跨阈值仅在 auto 状态 (!is_user_pinned) 下改模式\n- Pinned(rail_a) 时 hover rail_b（≠a）→ 在 Order::Foreground 同位遮盖 Pinned panel 的 Hover Preview\n- Preview 内点子项 → 切换 pinned_rail；点 Pin → 切换 pinned_rail + 保持 Pinned\n\n## 关键技术数值\n\n- 防抖延迟: 180ms\n- 动画时长: 200ms, easing quadratic_out\n- 阈值: Wide >=1000, Medium 600~1000, Narrow <600\n- Pinned 宽度: 300 (本轮固定，P3 自画 Splitter)\n- Flyout/Modal 圆角: nw:0 ne:12 sw:0 se:12\n- Flyout 阴影: offset(8,0) blur24 α0.4\n- Modal scrim: scheme.scrim α0.5\n- Hover Preview 淡入: 150ms\n\n## 组件拆分\n\nmaterial/ 下新建 util.rs, list_item.rs, nav_rail_item.rs, icon_button.rs, ripple.rs\n新建 sidebar.rs 放状态机\napp.rs 瘦身为骨架 + demo 面板\n\n## 新增 demo rail\n\nFiles / Projects / Settings / Help 四个板块，保留现有 6 个 rail（theme_toggle 等）不动"
desc = "基于 feedback.md 讨论的二级 List 响应式改进：Pinned/Flyout/Modal 三态模型 + 180ms Hover 防抖 + 响应式三阶梯切换 + Hover Preview 覆盖层。计划分拆分期（纯结构迁移）和 P1+P2 实施两阶段"

