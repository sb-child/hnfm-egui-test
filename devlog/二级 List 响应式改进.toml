[[sections]]
number = "16"
title = "最终 UI 交互提案：2 态模型 (Pinned + Flyout) + 统一 scrim"
created_at = "2026-07-23 00:21:46 UTC+8"
modified_at = "2026-07-23 00:21:46 UTC+8"
content = "## 模式（2 态）\n\n```\nPinned ─── inline Panel，占布局，扁平无阴影无圆角\nFlyout ─── overlay + scrim + 阴影 + 大圆角，不占布局\n```\n\nFlyout 是唯一 overlay 模式，删除 Modal，合并为一个模式。所有 Flyout 始终带 scrim。\n\n## 触发 + 关闭\n\n| | Hover 触发 | Click 触发 |\n|---|---|---|\n| 入口 | 鼠标停滞在 rail 上 180/300ms | 点击 rail |\n| 延迟 | Wide 180ms / Narrow 300ms | 无 |\n| 关闭 | 鼠标移出 area | Esc / scrim 点 / close_requested |\n| scrim | 始终有 | 始终有 |\n\n## 响应式三阶梯\n\n| 宽度 | 默认 | Hover 延迟 | Hover 行为 | Click 行为 |\n|------|------|-----------|-----------|-----------|\n| Wide (>=1000) | Pinned | 180ms | Hover Preview | Pin |\n| Medium (600~1000) | Hidden | 180ms | Flyout → 离开关闭 | Flyout → 不自动关 |\n| Narrow (<600) | Hidden | 300ms | Flyout → 离开关闭 | Flyout → 不自动关 |\n\n- 用户 Pin 后 is_user_pinned=true，跨阈值不切换\n- Pin 按钮未来实现在 Header\n\n## 关闭条件矩阵\n\n| | Esc | scrim 点击 | 鼠标离开 | close_requested |\n|---|---|---|---|---|\n| Hover 触发的 Flyout | yes | yes | yes | yes |\n| Click 触发的 Flyout | yes | yes | no | yes |\n\n## close_requested 预留\n\n```rust\n// SidebarState\npub close_requested: bool,  // 默认 false\n\n// handle_input\nif state.close_requested && state.mode.is_overlay() {\n    state.mode = SidebarMode::Hidden;\n    state.close_requested = false;\n}\n```\n\n只预留字段 + handle_input 处理，不接线。（未来 ListItem 点击设 close_requested = true 即可触发关闭）\n\n## 实现步骤\n\n### 4a（当前）：Merge Flyout/Modal + 统一 scrim\n\n| # | 文件 | 改动 |\n|---|------|------|\n| 1 | sidebar.rs 枚举 | 删 Modal(RailId) 变体 |\n| 2 | sidebar.rs impl | 删 is_modal()，is_overlay() 只匹 Flyout |\n| 3 | sidebar.rs render_overlays | Flyout 分支直接走 scrim+content（原 Modal 渲染） |\n| 4 | sidebar.rs render_overlays | 删 render_flyout 函数 |\n| 5 | sidebar.rs render_overlays | render_modal_overlay 改名/保留，作为唯一 overlay 渲染 |\n| 6 | sidebar.rs rail_click | Flyout + Modal 两臂合并为一臂 |\n| 7 | sidebar.rs update_hover | 不再区分为 Modal，统一设 Flyout |\n| 8 | sidebar.rs handle_input | is_modal() → is_overlay() |\n| 9 | app.rs | is_pinned 检查不变（Pinned 不受影响） |\n\n### 4b：close_requested 预留\n\n| # | 文件 | 改动 |\n|---|------|------|\n| 1 | sidebar.rs SidebarState | 新增 pub close_requested: bool |\n| 2 | sidebar.rs SidebarState::new | 初始化为 false |\n| 3 | sidebar.rs handle_input | if close_requested && is_overlay → Hidden |\n\n### 5（未来）：Hover 180/300ms + 离开关闭\n\n### 6（未来）：Pin/Unpin\n\n### 7（未来）：Hover Preview\n\n### 8（未来）：动画过渡"
desc = "合并 Flyout/Modal 为单一 overlay 模式，始终带 scrim，Hover 延迟分宽窄屏"

[[sections]]
number = "17"
title = "状态机显式枚举重构"
created_at = "2026-07-23 01:47:55 UTC+8"
modified_at = "2026-07-23 01:47:55 UTC+8"
content = "## 改动概要\n\n### sidebar.rs 重写\n\n**删除的类型:**\n- `SidebarMode` enum（功能由 SidebarInner 变体替代）\n- `FlyoutTrigger` enum（功能由 SidebarInner::FlyoutHover / FlyoutClick 替代）\n- `reset_hover()` 函数（不再需要，状态变体切换自带字段重设）\n- `flyout_rail()` 函数（render_mode() 替代）\n- `responsive_default()` 函数（apply_responsive 内联）\n- `handle_input()` 函数（合并到 refresh）\n- `update_hover()` 函数（合并到 refresh）\n- `apply_responsive_default()` 函数（合并到 refresh）\n\n**新增:**\n- `RenderMode` enum: `Hidden` / `Pinned(RailId)` / `Flyout(RailId)` —— 渲染函数匹配此枚举\n- `SidebarInner` enum: `Hidden` / `Pinned` / `FlyoutHoverPending` / `FlyoutHover` / `FlyoutClick`\n- 公开 API: `refresh()` / `click_rail()` / `check_flyout_leave()` / `render_mode()`\n\n**demo 状态移入 SidebarState:**\n- `list_sel_std`, `list_sel_seg_0`, `list_sel_seg_1`, `list_sel_seg_2`\n- `render_pinned` / `render_overlays` 不再需要 `&mut bool` 参数\n\n**边界条件修复:**\n- Flyout* 状态在窗口放大到 >=1000 时自动切到 Pinned（之前跳过 Flyout，导致 BUG）\n- close_requested 始终被清除（之前非 overlay 时不清除会残留）\n- hover_blocked 在鼠标离开 rail 时自动清除\n\n### app.rs 变更\n\n**之前 (6 个 sidebar 调用，严格时序):**\n```\nnav_rail() 内含 update_hover → apply_responsive_default → handle_input\n→ is_pinned 判断 → render_pinned → render_overlays → check_flyout_leave\n```\n\n**之后 (3 个 sidebar 调用):**\n```\nnav_rail() 返回 hovered_rail(纯渲染)\n→ state.refresh() (一次替代 3 个转换函数)\n→ match render_mode() { Pinned → Panel, Flyout → overlays }\n→ state.check_flyout_leave()\n```\n\n**删除的 AppLayout 字段:**\n- `list_sel_std`, `list_sel_seg_0`, `list_sel_seg_1`, `list_sel_seg_2`（移入 SidebarState）\n\n### 侵入性改善\n\n| 指标 | 重构前 | 重构后 |\n|------|--------|--------|\n| 公开函数数 | 7 | 4 |\n| app.rs 调用次数/帧 | 6 | 3-4 |\n| 非法状态组合 | 存在 (mode=Flyout, trigger=None 等) | 0 (变体自动约束) |\n| list_sel_* 透传参数 | 4 &mut bool | 0 |\n"
desc = "将 SidebarState 从 10 字段 struct 重构为显式状态枚举，消除非法状态组合，统一状态入口，降低 app.rs 调用侵入性"

