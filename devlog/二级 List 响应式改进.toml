[[sections]]
number = "3"
title = "P1+P2 实施完成"
created_at = "2026-07-21 22:08:42 UTC+8"
modified_at = "2026-07-21 22:08:42 UTC+8"
content = "## 已实现功能\n\n### 状态机 SidebarState\n- `RailId`: Files / Projects / Settings / Help 四个 demo 板块\n- `SidebarMode`: Hidden / Flyout(rail) / Pinned(rail) / Modal(rail)\n- `SidebarState`: mode + pinned_rail + hover_rail + hover_since + is_user_pinned + preview_active\n\n### 交互\n- **180ms Hover 防抖**: Rail 悬停超 180ms → 根据屏幕宽度触发 Flyout（Medium）或 Pinned（Wide）\n- **Rail 点击**: Wide→Pin, Medium→Flyout, Narrow→Modal；已 Pin 时点同 rail 取消 Pin\n- **Pin 按钮**: sidebar Header 右上角 IconButton(toggle 型)，圆圈占位（实心=pinned，空心=unpinned）。Pin→固化为 Pinned(rail)，Unpin→Hidden\n- **Hover Preview**: Pinned(rail_a) 时 hover rail_b → 在 Foreground 层同位遮盖 Pinned panel 的 Preview 浮层，移开即消失\n- **Flyout 关闭**: pointer 离开 rail + flyout rect → 关闭\n- **Modal 关闭**: Esc 键。scrim 全屏半透明绘制（不交互，因 egui 0.35 限制）\n\n### 响应式\n- Wide(>=1000): 默认 Pinned\n- Medium(600~1000): 默认 Hidden + Flyout(Hover)\n- Narrow(<600): 默认 Hidden + Modal(Click)\n- 用户 Pin/Unpin 后设置 is_user_pinned，跨阈值不自动切换\n- Narrow 下 Hover 也出 Flyout（而非 Modal），仅点击出 Modal\n\n### 视觉\n- Pinned: 扁平 Panel，无阴影无圆角，fill=surface\n- Flyout/Modal: Area Foreground + Shadow(offset:8,blur:24,a:0.4) + CornerRadius(nw:0,ne:12,sw:0,se:12) + fill=surface_container_high\n- Modal scrim: scheme.scrim α0.5 全屏半透明\n\n### 文件改动\n- src/material/icon_button.rs: IconButton toggle 型组件（48x48→24尺寸配置，圆圈占位图标，state layer）\n- src/sidebar.rs: 完整状态机 + sidebar_body（Header+Pin+ListItem按板块分发）+ render_overlays (Flyout/Modal/Preview)\n- src/app.rs: AppLayout 接入 SidebarState；nav_rail 新增 4 个 demo rail + hover/click 追踪；条件式 Pinned Panel + overlay 在 CentralPanel 之后渲染\n\n### 已知限制\n- 不同 rail 的 segmented 选择状态共用 list_sel_seg_0/1/2（demo 阶段）\n- scrim 点击关闭模态暂未实现（egui 0.35 ctx.interact API 不存在）\n- Pinned panel 宽度固定 300px"
desc = "实现二级 List 的 Pinned/Flyout/Modal 三态模型 + Header Pin 按钮 + 180ms Hover 防抖 + 响应式三阶默认 + Hover Preview 覆盖层 + IconButton 组件"

[[sections]]
number = "4"
title = "修复：Flyout Area 被 content_rect 约束推出可见区域"
created_at = "2026-07-22 03:18:12 UTC+8"
modified_at = "2026-07-22 03:18:12 UTC+8"
content = "## 根因\n\negui 0.35 `Area::show()` 内部逻辑：\n- 默认 `constrain = true`，constrain_rect 取 `ctx.content_rect()`\n- `ctx.content_rect()` 返回 CentralPanel 可用区域（减去所有 Panel 后的剩余空间），不是屏幕尺寸\n- 渲染后：`size = size.at_most(constrain_rect.size())` — 尺寸被 clamp\n- `state.rect = ...align_size_within_rect(size, constrain_rect)` — 位置被约束到 content_rect 内\n\nFlyout 宽度 300px + margin > content_rect 宽度时，每帧被重新定位，推出可见区域。\n\n## 修复\n\nrender_single_overlay (line 619) 和 scrim Area (line 561) 的 `egui::Area::new(...)` 均加 `.constrain(false)`。"
desc = "egui 0.35 Area 默认 constrain=true，导致 Flyout 渲染后被 ctx.content_rect() 约束重新定位到可见区域外。fix: Area::constrain(false)。"

